<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6fa463" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="logo.jpeg" />
  <title>Caisse Lucie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <img src="logo.jpeg" alt="Lucie" />
    <h1>Caisse — Ticket de caisse</h1>
    <button class="btn-reglages" id="btnReglages" aria-label="Réglages du ticket">⚙</button>
  </header>

  <main id="menu"><!-- généré par app.js --></main>

  <!-- Modale Réglages du ticket -->
  <div class="overlay" id="overlay" hidden>
    <div class="modale" role="dialog" aria-modal="true" aria-labelledby="titreReglages">
      <h2 id="titreReglages">Réglages du ticket</h2>

      <label for="champNumero">Numéro de facture</label>
      <input type="number" id="champNumero" inputmode="numeric" min="1" step="1" />
      <p class="aide" id="aideNumero"></p>

      <label for="champDate">Date</label>
      <input type="date" id="champDate" />

      <label for="champHeure">Heure</label>
      <input type="time" id="champHeure" />

      <div class="modale-actions">
        <button class="btn btn-vider" id="btnMaintenant">Date/heure : maintenant</button>
        <button class="btn btn-pdf" id="btnFermerReglages">OK</button>
      </div>
    </div>
  </div>

  <section class="panier">
    <div class="detail-panier" id="detailPanier">
      <ul id="listePanier"></ul>
    </div>
    <div class="resume">
      <div>
        <div class="total" id="totalLabel">0,00 € <small>TTC</small></div>
        <button class="lien-detail" id="toggleDetail">Voir le détail</button>
      </div>
      <div class="actions">
        <button class="btn btn-vider" id="btnVider">Vider</button>
        <button class="btn btn-pdf" id="btnPdf" disabled>Exporter PDF</button>
      </div>
    </div>
  </section>

  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="menu.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
