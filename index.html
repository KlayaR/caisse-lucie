<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6fa463" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="logo.jpeg" />
  <title>Caisse Lucie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <img src="logo.jpeg" alt="Lucie" />
    <h1>Caisse — Ticket de caisse</h1>
  </header>

  <main>
    <!-- Réglages du ticket, directement sur la page -->
    <section class="reglages">
      <div class="grille">
        <div class="champ">
          <label for="champDate">Date</label>
          <input type="date" id="champDate" />
        </div>
        <div class="champ">
          <label for="champHeure">Heure</label>
          <input type="time" id="champHeure" />
        </div>
        <div class="champ champ-large">
          <label for="champNumero">N° de facture (auto)</label>
          <input type="number" id="champNumero" inputmode="numeric" step="1" />
        </div>
      </div>
      <p class="aide" id="aideNumero"></p>
    </section>

    <div id="menu"><!-- généré par app.js --></div>
  </main>

  <section class="panier">
    <div class="detail-panier" id="detailPanier">
      <ul id="listePanier"></ul>
    </div>
    <div class="resume">
      <div>
        <div class="total" id="totalLabel">0,00 € <small>TTC</small></div>
        <button class="lien-detail" id="toggleDetail">Voir le détail</button>
      </div>
      <div class="actions">
        <button class="btn btn-vider" id="btnVider">Vider</button>
        <button class="btn btn-pdf" id="btnPdf" disabled>Exporter PDF</button>
      </div>
    </div>
  </section>

  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="menu.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
